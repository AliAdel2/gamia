<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صرف المساعدات | خريطة الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --bg-body: #f1f5f9;
            --primary-blue: #2563eb;
            --primary-green: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border-soft: #e2e8f0;
        }

        body { background-color: var(--bg-body); font-family: 'Cairo', sans-serif; color: var(--text-main); }
        
        .app-header {
            background: #fff;
            color: var(--text-main); padding: 30px 0 20px; 
            border-bottom: 1px solid var(--border-soft);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 45px;
            border-radius: 0 0 30px 30px;
        }
        
        .back-nav {
            position: absolute; right: 20px; top: 30px;
            color: var(--text-main); font-size: 1.5rem; transition: 0.3s;
        }

        .action-card {
            background: var(--white); border-radius: 25px; 
            border: 1px solid var(--border-soft);
            padding: 30px; margin-top: -40px; 
            padding-top: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        
        /* نتائج البحث المنسقة */
        .search-results-wrapper {
            position: absolute; width: 100%; max-height: 250px; overflow-y: auto;
            background: var(--white); border-radius: 15px; z-index: 1000;
            display: none; border: 1px solid var(--primary-blue); margin-top: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .search-item {
            padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border-soft);
            transition: 0.2s; color: var(--text-main);
        }
        .search-item:hover { background-color: #f8fafc; color: var(--primary-blue); }
        .search-item div { font-weight: 700; font-size: 0.9rem; }
        .search-item small { color: var(--text-muted); font-size: 0.75rem; }

        /* صندوق معلومات المستفيد المختار */
        .beneficiary-info-box {
            background: #ecfdf5; border-radius: 18px; padding: 20px; 
            margin: 25px 0; display: none; border: 1px solid var(--primary-green);
        }

        .form-control, .form-select {
            background: #f8fafc !important; border: 1px solid var(--border-soft) !important;
            color: var(--text-main) !important; border-radius: 14px; padding: 12px 15px;
            font-weight: 600;
        }
        .form-control:focus, .form-select:focus { 
            border-color: var(--primary-blue) !important; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
        }
        
        label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; margin-right: 5px; text-transform: uppercase; }

        .btn-submit { 
            background: var(--primary-green); border: none; padding: 16px; 
            border-radius: 18px; font-weight: 800; color: #fff; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
        }
        .btn-submit:disabled { background: #cbd5e1; color: #94a3b8; box-shadow: none; }
        .btn-submit:hover:not(:disabled) { background: #059669; transform: translateY(-2px); box-shadow: 0 12px 25px rgba(16, 185, 129, 0.3); }

        .user-badge {
            font-size: 0.7rem; background: #f1f5f9; color: var(--text-muted);
            padding: 8px 18px; border-radius: 20px; display: inline-block; margin-top: 12px;
            font-weight: 700; border: 1px solid var(--border-soft);
        }
    </style>
</head>
<body>

<header class="app-header text-center position-relative">
    <a href="dashboard.html" class="back-nav"><i class="bi bi-arrow-right-circle-fill"></i></a>
    <div class="container">
        <h4 class="fw-800 mb-0" style="color: var(--primary-blue);"><i class="bi bi-wallet2 me-2"></i> تسجيل عملية صرف</h4>
        <div class="user-badge" id="currentUserDisplay"><i class="bi bi-person-circle me-1"></i> جاري التعرف على الموظف...</div>
    </div>
</header>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="action-card">
                <form id="disbursementForm">
                    <div class="mb-4 position-relative">
                        <label>ابحث عن المستفيد (الاسم أو الرقم القومي)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-0 text-primary"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control" placeholder="اكتب للبحث عن اسم الحالة..." autocomplete="off">
                        </div>
                        <div id="searchResults" class="search-results-wrapper"></div>
                    </div>

                    <div id="beneficiaryBox" class="beneficiary-info-box">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-bold mb-1" id="dispName" style="color: #065f46;">--</h6>
                                <p class="small mb-0 opacity-75" id="dispId" style="color: #065f46;">--</p>
                            </div>
                            <span class="badge" id="dispType" style="background: var(--primary-green); font-size: 0.7rem; padding: 6px 12px; border-radius: 8px;">--</span>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label>نوع المساعدة</label>
                            <select id="aidType" class="form-select" disabled required>
                                <option value="مالية">💰 مساعدة مالية</option>
                                <option value="غذائية">🍲 مساعدة غذائية</option>
                                <option value="طبية">🏥 مساعدة طبية</option>
                                <option value="أخرى">📦 أخرى</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>المبلغ المستحق (ج.م)</label>
                            <input type="number" id="amount" class="form-control text-center fw-bold" style="color: var(--primary-green) !important; font-size: 1.2rem;" placeholder="0" required disabled>
                        </div>
                        <div class="col-12">
                            <label>وصف المساعدة / ملاحظات</label>
                            <input type="text" id="note" class="form-control" placeholder="مثال: شنطة رمضان - كشف طبي..." disabled>
                        </div>
                        <div class="col-12">
                            <label>تاريخ عملية الصرف</label>
                            <input type="date" id="disbursementDate" class="form-control" required disabled>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn btn-submit w-100 mt-4 shadow-sm" disabled>
                        تأكيد وإتمام الصرف الآن <i class="bi bi-check2-circle ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
    authDomain: "masar-8dbce.firebaseapp.com",
    projectId: "masar-8dbce",
    storageBucket: "masar-8dbce.firebasestorage.app",
    messagingSenderId: "201867140566",
    appId: "1:201867140566:web:b21dd8f049276007ed1877"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUserName = "مسؤول الصرف";
  let allBeneficiaries = [];
  let selectedBeneficiary = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserName = user.displayName || user.email.split('@')[0];
    }
    document.getElementById('currentUserDisplay').innerHTML = `<i class="bi bi-person-check-fill me-1 text-primary"></i> الموظف المسؤول: ${currentUserName}`;
  });

  onSnapshot(collection(db, "beneficiaries"), (snapshot) => {
    allBeneficiaries = [];
    snapshot.forEach((doc) => {
        allBeneficiaries.push({ id: doc.id, ...doc.data() });
    });
  });

  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.trim().toLowerCase();
    searchResults.innerHTML = '';
    if (term.length < 2) { searchResults.style.display = 'none'; return; }

    const matches = allBeneficiaries.filter(b => 
        (b.fullName && b.fullName.toLowerCase().includes(term)) || 
        (b.nationalId && b.nationalId.includes(term))
    ).slice(0, 5);

    if (matches.length > 0) {
        matches.forEach(person => {
            const div = document.createElement('div');
            div.className = 'search-item';
            div.innerHTML = `<div>${person.fullName}</div><small>الرقم القومي: ${person.nationalId || 'غير مسجل'}</small>`;
            div.onclick = () => selectPerson(person);
            searchResults.appendChild(div);
        });
        searchResults.style.display = 'block';
    } else { searchResults.style.display = 'none'; }
  });

  function selectPerson(person) {
    selectedBeneficiary = person;
    searchInput.value = person.fullName;
    searchResults.style.display = 'none';
    
    document.getElementById('beneficiaryBox').style.display = 'block';
    document.getElementById('dispName').innerText = person.fullName;
    document.getElementById('dispId').innerText = "الرقم القومي: " + (person.nationalId || '---');
    document.getElementById('dispType').innerText = person.category || 'عام';
    
    document.querySelectorAll('#aidType, #amount, #note, #disbursementDate, #btnSubmit').forEach(el => el.disabled = false);
    document.getElementById('disbursementDate').valueAsDate = new Date();
  }

  document.getElementById('disbursementForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const amountVal = parseFloat(document.getElementById('amount').value);
    if (amountVal <= 0) { alert("يرجى إدخال مبلغ صحيح"); return; }

    const paymentData = {
        beneficiaryId: selectedBeneficiary.id,
        beneficiaryName: selectedBeneficiary.fullName,
        amount: amountVal,
        aidType: document.getElementById('aidType').value,
        note: document.getElementById('note').value || document.getElementById('aidType').value,
        date: document.getElementById('disbursementDate').value,
        recordedBy: currentUserName,
        timestamp: serverTimestamp()
    };

    try {
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').innerText = "جاري المعالجة...";
        await addDoc(collection(db, "transactions"), paymentData);
        alert(`تم تسجيل العملية بنجاح للمستفيد: ${selectedBeneficiary.fullName}`);
        location.reload(); 
    } catch (error) { 
        alert("حدث خطأ أثناء الحفظ: " + error.message);
        document.getElementById('btnSubmit').disabled = false;
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.position-relative')) searchResults.style.display = 'none';
  });
</script>
</body>
</html>
