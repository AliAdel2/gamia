<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين | خريطة الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خريطة الخير">
<link rel="apple-touch-icon" href="icon-512.png">

<meta name="theme-color" content="#2563eb">

    <style>
        :root { --bg: #f8fafc; --primary: #2563eb; --success: #10b981; --danger: #ef4444; --border: #e2e8f0; }
        * { font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); padding-bottom: 50px; }

        .admin-header {
            background: white; padding: 20px; border-radius: 0 0 35px 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center;
            margin-bottom: 20px; border-bottom: 3px solid var(--primary);
        }

        .user-card {
            background: white; border-radius: 25px; padding: 30px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        .form-label { font-weight: 700; font-size: 13px; color: #64748b; margin-bottom: 8px; }
        .form-control, .form-select {
            border-radius: 15px; padding: 12px; border: 1px solid var(--border);
            background: #f8fafc; font-weight: 600;
        }

        .btn-action {
            border: none; padding: 15px; border-radius: 18px; font-weight: 800;
            width: 100%; margin-top: 10px; transition: 0.3s; color: white;
        }
        .btn-add { background: var(--primary); }
        .btn-update { background: var(--success); }
        
        .table-container { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .table thead { background: #f1f5f9; }
        .role-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .badge-admin { background: #fee2e2; color: #dc2626; }
        .badge-manager { background: #fef3c7; color: #92400e; }
        .badge-staff { background: #e0f2fe; color: #0369a1; }
        
        .btn-edit-sm { padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        .btn-delete-sm { padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; margin-right: 5px; }
    </style>
</head>
<body>

<div class="admin-header">
    <h4 class="fw-900 m-0"><i class="fas fa-users-cog me-2 text-primary"></i> إدارة طاقم العمل</h4>
    <p class="text-muted small mt-2" id="formTitle">إضافة موظف جديد للبرنامج</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="user-card shadow-sm">
                <form id="userForm">
                    <input type="hidden" id="editUserId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">اسم الموظف</label>
                            <input type="text" id="userName" class="form-control" placeholder="الاسم بالكامل" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" id="userEmail" class="form-control" placeholder="name@domain.com" required>
                        </div>
                        <div class="col-md-6" id="passContainer">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" id="userPass" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الصلاحية</label>
                            <select id="userRole" class="form-select">
                                <option value="staff">موظف صرف</option>
                                <option value="manager">مدير حالة</option>
                                <option value="admin">مدير نظام</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-action btn-add" id="submitBtn">
                        <span id="btnText">إنشاء الحساب الآن</span> <i class="fas fa-check-circle ms-2"></i>
                    </button>
                    <button type="button" id="cancelBtn" class="btn btn-link w-100 mt-2 d-none text-secondary fw-bold">إلغاء التعديل</button>
                </form>
            </div>

            <div class="table-container shadow-sm">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead>
                        <tr>
                            <th class="p-3 text-end">الموظف</th>
                            <th class="p-3">الرتبة</th>
                            <th class="p-3">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const userForm = document.getElementById('userForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const cancelBtn = document.getElementById('cancelBtn');
    const editUserId = document.getElementById('editUserId');

    // 1. جلب وعرض المستخدمين
    onSnapshot(collection(db, "users"), (snapshot) => {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        snapshot.forEach((userDoc) => {
            const u = userDoc.data();
            const roleClass = u.role === 'admin' ? 'badge-admin' : (u.role === 'manager' ? 'badge-manager' : 'badge-staff');
            const roleName = u.role === 'admin' ? 'مدير' : (u.role === 'manager' ? 'متابعة' : 'صرف');
            
            tbody.innerHTML += `
                <tr>
                    <td class="p-3 fw-bold text-end text-truncate" style="max-width: 120px;">${u.fullName}</td>
                    <td class="p-3"><span class="role-badge ${roleClass}">${roleName}</span></td>
                    <td class="p-3">
                        <div class="d-flex justify-content-center">
                            <button class="btn btn-outline-primary btn-edit-sm" 
                                onclick="fillFormForEdit('${userDoc.id}', '${u.fullName}', '${u.email}', '${u.role}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-delete-sm" 
                                onclick="deleteUser('${userDoc.id}', '${u.fullName}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    });

    // 2. وظيفة التعديل
    window.fillFormForEdit = (id, name, email, role) => {
        editUserId.value = id;
        document.getElementById('userName').value = name;
        document.getElementById('userEmail').value = email;
        document.getElementById('userRole').value = role;
        document.getElementById('formTitle').innerText = "تعديل بيانات: " + name;
        btnText.innerText = "حفظ التعديلات";
        submitBtn.classList.replace('btn-add', 'btn-update');
        cancelBtn.classList.remove('d-none');
        document.getElementById('passContainer').style.display = 'none';
        document.getElementById('userEmail').disabled = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 3. وظيفة الحذف
    window.deleteUser = async (id, name) => {
        if (confirm(`هل أنت متأكد من حذف الموظف "${name}" نهائياً؟\nلن يتمكن من دخول النظام مرة أخرى.`)) {
            try {
                await deleteDoc(doc(db, "users", id));
                alert("تم حذف المستخدم بنجاح من قاعدة البيانات");
            } catch (error) {
                alert("خطأ أثناء الحذف: " + error.message);
            }
        }
    };

    cancelBtn.onclick = () => location.reload();

    userForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = editUserId.value;
        const name = document.getElementById('userName').value;
        const role = document.getElementById('userRole').value;
        submitBtn.disabled = true;

        try {
            if (id) {
                await updateDoc(doc(db, "users", id), { fullName: name, role: role });
                alert("تم التحديث");
            } else {
                const email = document.getElementById('userEmail').value;
                const pass = document.getElementById('userPass').value;
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: name });
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    uid: userCredential.user.uid,
                    fullName: name,
                    email: email,
                    role: role,
                    createdAt: new Date().toISOString()
                });
                alert("تم الإضافة");
            }
            location.reload();
        } catch (error) {
            alert("حدث خطأ: " + error.message);
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
