<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الأسرة | خريطة الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خريطة الخير">
<link rel="apple-touch-icon" href="icon-512.png">

<meta name="theme-color" content="#2563eb">

    <style>
        :root {
            --bg-body: #f8fafc;
            --white: #ffffff;
            --primary-blue: #2563eb;
            --primary-green: #10b981;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-soft: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-body); color: var(--text-dark); padding-bottom: 100px; }
        
        .header {
            background: var(--white);
            padding: 25px 15px; border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px;
            border-bottom: 1px solid var(--border-soft);
        }

        /* كارت فرد الأسرة - منسق */
        .family-card {
            background: var(--white); border-radius: 20px; padding: 18px;
            margin-bottom: 15px; border: 1px solid var(--border-soft);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        .family-card:hover { border-color: var(--primary-blue); transform: translateY(-2px); }

        .info-content { flex-grow: 1; }
        .rel-badge { 
            font-size: 10px; padding: 3px 12px; border-radius: 8px; 
            font-weight: 800; margin-bottom: 6px; display: inline-block; 
            background: rgba(37, 99, 235, 0.08); color: var(--primary-blue);
        }
        
        .actions { display: flex; gap: 8px; margin-right: 15px; }
        .btn-mini { 
            background: #f1f5f9; border: 1px solid var(--border-soft); 
            color: var(--text-dark); width: 36px; height: 36px; 
            border-radius: 10px; font-size: 14px; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-edit:hover { background: var(--primary-blue); color: #fff; border-color: var(--primary-blue); }
        .btn-delete:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

        /* زر الإضافة العائم */
        .add-btn {
            position: fixed; bottom: 30px; left: 30px;
            width: 60px; height: 60px; background: var(--primary-green);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; color: #fff;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); border: none; z-index: 1000;
            transition: 0.3s;
        }
        .add-btn:active { transform: scale(0.9); }

        /* المودال */
        .modal-content { background: var(--white); border-radius: 25px; border: none; }
        .form-control, .form-select { 
            background: #f8fafc !important; border: 1px solid var(--border-soft) !important; 
            color: var(--text-dark) !important; border-radius: 12px; padding: 12px; 
            font-weight: 600;
        }
        .form-control:focus { border-color: var(--primary-blue) !important; box-shadow: none; }
        .form-label { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header text-center position-relative">
    <a href="javascript:history.back()" class="position-absolute start-0 ms-3 text-dark"><i class="fas fa-chevron-right fa-lg"></i></a>
    <h5 class="fw-900 m-0">أفراد الأسرة</h5>
    <div class="badge bg-primary rounded-pill mt-2 px-3" id="family_count" style="font-weight: 700;">عدد الأفراد: 0</div>
</div>

<div class="container" id="family_list">
    <div class="text-center py-5 opacity-50">
        <div class="spinner-border text-primary spinner-border-sm"></div>
    </div>
</div>

<button class="add-btn" id="addBtnMain"><i class="fas fa-plus"></i></button>

<div class="modal fade" id="memberModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title fw-bold" id="modalTitle">إضافة فرد جديد</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="memberForm">
                    <input type="hidden" id="memberId">
                    <div class="mb-3">
                        <label class="form-label">الاسم بالكامل</label>
                        <input type="text" id="m_name" class="form-control" required placeholder="ادخل الاسم الرباعي">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">صلة القرابة</label>
                            <select id="m_rel" class="form-select">
                                <option value="ابن">ابن</option><option value="ابنة">ابنة</option>
                                <option value="زوجة">زوجة</option><option value="زوج">زوج</option>
                                <option value="أخرى">أخرى</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">الرقم القومي</label>
                            <input type="number" id="m_nationalId" class="form-control" placeholder="14 رقم">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">السن (تلقائي)</label>
                            <input type="number" id="m_age" class="form-control" readonly>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">التعليم</label>
                            <select id="m_edu" class="form-select">
                                <option value="تحت السن">تحت السن</option><option value="ابتدائى">ابتدائى</option>
                                <option value="إعدادى">إعدادى</option><option value="ثانوى">ثانوى</option>
                                <option value="دبلوم">دبلوم</option><option value="جامعة">جامعة</option>
                                <option value="أنهى التعليم">أنهى التعليم</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ملاحظات (اختياري)</label>
                        <input type="text" id="m_notes" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mt-2" id="saveBtn">حفظ البيانات</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const b_id = urlParams.get('id');

    const modalElement = document.getElementById('memberModal');
    const memberModal = new bootstrap.Modal(modalElement);

    window.openAddModal = () => {
        document.getElementById('memberForm').reset();
        document.getElementById('memberId').value = '';
        document.getElementById('modalTitle').innerText = 'إضافة فرد جديد';
        memberModal.show();
    };

    window.editMember = (id, name, rel, nid, age, edu, notes) => {
        document.getElementById('memberId').value = id;
        document.getElementById('m_name').value = name;
        document.getElementById('m_rel').value = rel;
        document.getElementById('m_nationalId').value = nid || '';
        document.getElementById('m_age').value = age || '';
        document.getElementById('m_edu').value = edu;
        document.getElementById('m_notes').value = notes !== 'undefined' ? notes : '';
        document.getElementById('modalTitle').innerText = 'تعديل بيانات الفرد';
        memberModal.show();
    };

    window.deleteMember = async (id) => {
        if(confirm('هل أنت متأكد من حذف هذا الفرد؟')) {
            await deleteDoc(doc(db, "family_members", id));
        }
    };

    document.getElementById('addBtnMain').onclick = window.openAddModal;

    document.getElementById('m_nationalId').addEventListener('input', function(e) {
        let id = e.target.value;
        if(id.length === 14) {
            let yearPart = id.substring(1, 3);
            let monthPart = id.substring(3, 5);
            let dayPart = id.substring(5, 7);
            let century = id.charAt(0) === '3' ? '20' : '19';
            let birthDate = new Date(`${century}${yearPart}-${monthPart}-${dayPart}`);
            let age = new Date().getFullYear() - birthDate.getFullYear();
            document.getElementById('m_age').value = age;
        }
    });

    if (b_id) {
        const q = query(collection(db, "family_members"), where("beneficiaryId", "==", b_id));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('family_list');
            document.getElementById('family_count').innerText = `عدد الأفراد: ${snap.size}`;
            list.innerHTML = '';
            if(snap.empty) {
                list.innerHTML = '<div class="text-center py-5 opacity-50">لا يوجد أفراد أسرة مسجلين</div>';
            }
            snap.forEach(sDoc => {
                const m = sDoc.data();
                const notes = m.notes ? m.notes.replace(/'/g, "\\'") : '';
                list.innerHTML += `
                    <div class="family-card">
                        <div class="info-content">
                            <span class="rel-badge">${m.rel} - ${m.age || '؟'} سنة</span>
                            <h6 class="fw-bold mb-1" style="color: var(--text-dark)">${m.name}</h6>
                            <p class="small text-muted m-0"><i class="fas fa-graduation-cap me-1 text-primary"></i> ${m.edu}</p>
                            ${m.notes ? `<p class="small text-success m-0 mt-1"><i class="fas fa-comment-dots me-1"></i> ${m.notes}</p>` : ''}
                        </div>
                        <div class="actions">
                            <button class="btn-mini btn-edit" onclick="editMember('${sDoc.id}', '${m.name.replace(/'/g, "\\'")}', '${m.rel}', '${m.nationalId}', '${m.age}', '${m.edu}', '${notes}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-mini btn-delete" onclick="deleteMember('${sDoc.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    }

    document.getElementById('memberForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('memberId').value;
        const data = {
            beneficiaryId: b_id,
            name: document.getElementById('m_name').value,
            rel: document.getElementById('m_rel').value,
            nationalId: document.getElementById('m_nationalId').value,
            age: document.getElementById('m_age').value,
            edu: document.getElementById('m_edu').value,
            notes: document.getElementById('m_notes').value
        };
        try {
            if(id) await updateDoc(doc(db, "family_members", id), data);
            else await addDoc(collection(db, "family_members"), data);
            memberModal.hide();
        } catch (err) { alert("خطأ في الحفظ: " + err.message); }
    };
</script>
</body>
</html>
