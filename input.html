<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المستفيدين | خريطة الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خريطة الخير">
<link rel="apple-touch-icon" href="icon-512.png">

<meta name="theme-color" content="#2563eb">

    <style>
        :root {
            --bg-light: #f8fafc; 
            --primary-blue: #2563eb; 
            --success-green: #22c55e;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: var(--bg-light); 
            color: var(--text-dark); 
            padding-bottom: 80px; 
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, var(--primary-blue), #1d4ed8);
            color: white; padding: 40px 0; margin-bottom: -50px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15);
            border-radius: 0 0 0px 0px;
        }

        /* Form Card */
        .form-card {
            background: var(--white); 
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            padding: 25px; margin-bottom: 30px;
            position: relative; z-index: 10;
        }

        /* Section Heads */
        .section-head { 
            color: var(--primary-blue); 
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 25px; font-weight: 800; font-size: 1rem;
            background: #f1f5f9; padding: 12px 15px; border-radius: 12px;
        }
        .section-head i { color: var(--success-green); }

        /* Inputs Styling */
        .form-label { font-weight: 700; color: var(--text-dark); font-size: 0.9rem; margin-bottom: 8px; }
        .form-control, .form-select { 
            border-radius: 12px; border: 1.5px solid var(--border-color); 
            padding: 12px; font-size: 0.95rem; transition: 0.3s;
            background: #fafafa;
        }
        .form-control:focus, .form-select:focus { 
            border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
            background: #fff;
        }

        /* Buttons */
        .btn-save { 
            background: var(--success-green); border: none; padding: 15px 50px;
            font-weight: 900; border-radius: 15px; color: white; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }
        .btn-save:hover { transform: translateY(-3px); background: #1ba94c; }

        .btn-back {
            color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem;
        }

        /* Loader */
        #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; }
        
        /* Navbar السفلي */
        .bottom-nav {
            display: flex; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); border-top: 1px solid var(--border-color);
            justify-content: space-around; padding: 12px 0; z-index: 1001;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
        }
        .nav-item { text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.75rem; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

<div id="loader" class="spinner-border text-primary" role="status"></div>

<header class="app-header text-center">
    <div class="container">
        <h2 id="mainTitle" class="fw-black mb-1">تسجيل مستفيد جديد</h2>
        <p class="opacity-75 small">أدخل البيانات بدقة لضمان سرعة البحث</p>
    </div>
</header>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
            <div class="form-card">
                <form id="beneficiaryForm">
                    
                    <div class="section-head"><i class="fas fa-user"></i> أولاً: البيانات الأساسية</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">الاسم الكامل</label>
                            <input type="text" id="fullName" class="form-control" placeholder="اسم المستفيد ثلاثي" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الرقم القومي (14 رقم)</label>
                            <input type="number" id="nationalId" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اسم الزوج أو الزوجة</label>
                            <input type="text" id="partnerName" class="form-control" placeholder="اختياري">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">الحالة الاجتماعية</label>
                            <select id="maritalStatus" class="form-select">
                                <option value="متزوج">متزوج</option>
                                <option value="أرمل/ة">أرمل/ة</option>
                                <option value="مطلق/ة">مطلق/ة</option>
                                <option value="أعزب">أعزب</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">عدد الأبناء</label>
                            <input type="number" id="childrenCount" class="form-control" value="0">
                        </div>
                    </div>

                    <div class="section-head"><i class="fas fa-map-marker-alt"></i> ثانياً: بيانات التواصل</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="tel" id="phone" class="form-control" placeholder="01xxxxxxxxx">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">رقم واتساب</label>
                            <input type="tel" id="whatsapp" class="form-control" placeholder="للتواصل والمراسلة">
                        </div>
                        <div class="col-12">
                            <label class="form-label">العنوان بالتفصيل</label>
                            <input type="text" id="address" class="form-control" placeholder="المنطقة - الشارع - رقم المنزل">
                        </div>
                    </div>

                    <div class="section-head"><i class="fas fa-file-invoice-dollar"></i> ثالثاً: تفاصيل المساعدة</div>
                    <div class="row g-3 mb-2">
                        <div class="col-md-4">
                            <label class="form-label">فئة المساعدة</label>
                            <select id="category" class="form-select">
                                <option value="أيتام">أيتام</option>
                                <option value="أرامل">أرامل</option>
                                <option value="حالات مرضية">حالات مرضية</option>
                                <option value="مساعدات عامة">مساعدات عامة</option>
                                <option value="موسمي">موسمي</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">نظام الصرف</label>
                            <select id="disbursementType" class="form-select" style="border-color: var(--primary-blue);">
                                <option value="monthly">صرف شهري</option>
                                <option value="seasonal">صرف موسمي</option>
                                <option value="medical">صرف علاجي</option>
                                <option value="emergency">طوارئ (مرة واحدة)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">الباحث المسؤول</label>
                            <input type="text" id="caseManager" class="form-control" placeholder="اسم موظف البحث">
                        </div>
                        <div class="col-12">
                            <label class="form-label">ملاحظات وتقرير الباحث</label>
                            <textarea id="notes" class="form-control" rows="3" placeholder="اكتب تقييمك للحالة والاحتياجات"></textarea>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <button type="submit" id="submitBtn" class="btn btn-save">
                             حفظ البيانات <i class="fas fa-check-circle ms-2"></i>
                        </button>
                        <div class="mt-3">
                            <a href="view.html" class="btn-back"><i class="fas fa-arrow-right me-1"></i> العودة للسجل دون حفظ</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i>الرئيسية</a>
    <a href="view.html" class="nav-item"><i class="fas fa-users"></i>السجل</a>
    <a href="input.html" class="nav-item active"><i class="fas fa-user-plus"></i>إضافة</a>
    <a href="disburse.html" class="nav-item"><i class="fas fa-wallet"></i>صرف</a>
</div>

<script type="module">
  // نفس منطق Firebase الخاص بك بدون تغيير في الوظائف
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
    authDomain: "masar-8dbce.firebaseapp.com",
    projectId: "masar-8dbce",
    storageBucket: "masar-8dbce.firebasestorage.app",
    messagingSenderId: "201867140566",
    appId: "1:201867140566:web:b21dd8f049276007ed1877"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  const editId = urlParams.get('editId') || urlParams.get('id');

  if (editId) {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('mainTitle').innerText = "تعديل بيانات مستفيد";
    document.getElementById('submitBtn').innerHTML = 'تحديث البيانات <i class="fas fa-sync ms-2"></i>';
    document.getElementById('nationalId').readOnly = true;

    const loadData = async () => {
        try {
            const docRef = doc(db, "beneficiaries", editId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('nationalId').value = data.nationalId || '';
                document.getElementById('partnerName').value = data.partnerName || '';
                document.getElementById('maritalStatus').value = data.maritalStatus || 'متزوج';
                document.getElementById('childrenCount').value = data.childrenCount || 0;
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('whatsapp').value = data.whatsapp || '';
                document.getElementById('address').value = data.address || '';
                document.getElementById('category').value = data.category || 'أيتام';
                document.getElementById('disbursementType').value = data.disbursementType || 'monthly';
                document.getElementById('caseManager').value = data.caseManager || '';
                document.getElementById('notes').value = data.notes || '';
            }
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    };
    loadData();
  }

  document.getElementById('beneficiaryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('loader').style.display = 'block';
    const id = document.getElementById('nationalId').value;
    
    const beneficiaryData = {
        fullName: document.getElementById('fullName').value,
        nationalId: id,
        partnerName: document.getElementById('partnerName').value,
        maritalStatus: document.getElementById('maritalStatus').value,
        phone: document.getElementById('phone').value,
        whatsapp: document.getElementById('whatsapp').value,
        childrenCount: document.getElementById('childrenCount').value,
        category: document.getElementById('category').value,
        disbursementType: document.getElementById('disbursementType').value,
        caseManager: document.getElementById('caseManager').value,
        address: document.getElementById('address').value,
        notes: document.getElementById('notes').value,
        updatedAt: new Date().toISOString()
    };

    if (!editId) beneficiaryData.createdAt = new Date().toISOString();

    try {
        await setDoc(doc(db, "beneficiaries", id), beneficiaryData, { merge: true });
        alert("تم الحفظ بنجاح!");
        window.location.href = 'view.html';
    } catch (error) { 
        alert("خطأ: " + error.message); 
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
  });
</script>
</body>
</html>
