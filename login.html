<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | خريطة الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        * { font-family: 'Cairo', sans-serif; }
        body { 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        .logo-box {
            width: 80px; height: 80px; background: var(--primary);
            color: white; border-radius: 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .form-control {
            border-radius: 15px; padding: 12px 20px;
            border: 1px solid #cbd5e1; background: #fff;
            margin-bottom: 20px; font-weight: 600;
        }

        .btn-login {
            background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 15px; width: 100%;
            font-weight: 800; font-size: 1.1rem; transition: 0.3s;
        }

        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1000;
            align-items: center; justify-content: center; flex-direction: column;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary mb-3"></div>
    <h6 class="fw-bold">جاري التحقق من الجلسة...</h6>
</div>

<div class="login-card">
    <div class="logo-box"><i class="fas fa-hand-holding-heart"></i></div>
    <h3 class="fw-900 mb-1">خريطة الخير</h3>
    <p class="text-muted small mb-4">سجل دخولك لإدارة المساعدات</p>

    <form id="loginForm">
        <div class="text-start">
            <label class="small fw-bold mb-2 ms-2">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="text-start">
            <label class="small fw-bold mb-2 ms-2">كلمة المرور</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">دخول النظام</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loader');

    // 1. التحقق التلقائي: إذا كان المستخدم مسجلاً مسبقاً، وجهه فوراً للوحة التحكم
    loader.style.display = 'flex';
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // المستخدم مسجل دخول بالفعل، نوجهه للرئيسية
            window.location.href = 'dashboard.html'; 
        } else {
            loader.style.display = 'none';
        }
    });

    // 2. عملية تسجيل الدخول
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        try {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';

            // ضبط "البقاء قيد تسجيل الدخول" حتى عند إغلاق المتصفح
            await setPersistence(auth, browserLocalPersistence);
            
            // تسجيل الدخول
            await signInWithEmailAndPassword(auth, email, password);
            
            // التوجيه للوحة التحكم
            window.location.href = 'dashboard.html';

        } catch (error) {
            btn.disabled = false;
            btn.innerText = 'دخول النظام';
            let msg = "خطأ في بيانات الدخول";
            if (error.code === 'auth/user-not-found') msg = "المستخدم غير موجود";
            if (error.code === 'auth/wrong-password') msg = "كلمة المرور غير صحيحة";
            alert(msg);
        }
    });
</script>
</body>
</html>
